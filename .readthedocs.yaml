version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - libopenmpi-dev
    - openmpi-bin
    - ninja-build

sphinx:
    configuration: docs/conf.py
    fail_on_warning: true

formats:
  - pdf

python:
    install:
      - requirements: docs/requirements.txt
      - method: pip
        path: openbt_pypkg
